services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: whackamole
      POSTGRES_USER: whackamole
      POSTGRES_PASSWORD: whackamole
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whackamole"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
